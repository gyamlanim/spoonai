<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=4" />
</head>
<body>

  <!-- ── 1. Landing ── -->
  <div id="view-landing" class="view active">
    <div class="landing-center">
      <div class="brand">
        <img src="/static/logo.png" class="brand-logo" alt="spoon" />
        <span class="brand-name">spoon</span>
      </div>
      <p class="tagline">Get the best answer from AI.</p>
      <h1 class="hero-text">spoon feeds you higher-quality<br />answers you can trust.</h1>
    </div>
    <div class="input-container">
      <div class="input-wrapper">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input id="input-landing" class="prompt-input" type="text"
               placeholder="Enter your prompt..."
               onkeydown="handleKey(event,'landing')" />
        <button class="send-btn" onclick="submitQuery('landing')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 12L22 2L14 22L11 13L2 12Z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── 2. Chat / processing screen ── -->
  <div id="view-processing" class="view">

    <div class="chat-header">
      <div class="brand">
        <img src="/static/logo.png" class="brand-logo" alt="spoon" />
        <span class="brand-name">spoon</span>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div id="chat-messages"></div>
    </div>

    <div class="input-container">
      <div class="input-wrapper">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input id="input-processing" class="prompt-input" type="text"
               placeholder="Enter your prompt..."
               onkeydown="handleKey(event,'processing')" />
        <button class="send-btn" onclick="submitQuery('processing')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 12L22 2L14 22L11 13L2 12Z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── 3. Results ── -->
  <div id="view-results" class="view">
    <div class="results-header">
      <button class="back-btn" onclick="showProcessing()">← Back to chat</button>
    </div>

    <div class="results-content">
      <p class="prompt-label">Your prompt:</p>
      <div class="prompt-pill" id="results-query"></div>

      <div class="cards-row">
        <div class="card answer-card">
          <div class="card-header">
            <div class="card-title-row">
              <div class="brand-inline">
                <img src="/static/logo.png" class="brand-logo-sm" alt="spoon" />
                <span class="brand-name-sm">spoon's Improved <strong>Answer</strong></span>
              </div>
              <button class="info-btn" onclick="showProcessing()" title="Back to chat">ℹ</button>
            </div>
          </div>
          <div class="card-body">
            <p id="results-answer"></p>
          </div>
        </div>

        <div class="card analysis-card">
          <div class="card-header">
            <h3 class="analysis-title">Analysis</h3>
          </div>
          <div class="card-body">
            <p id="results-analysis"></p>
          </div>
        </div>
      </div>

      <div class="original-responses">
        <p class="section-label">Original Responses</p>

        <div class="expander">
          <button class="expander-btn" onclick="toggleExpander('gpt')">
            <span class="dot gpt-dot"></span>
            <span>ChatGPT Response</span>
            <span class="chevron" id="chevron-gpt">▾</span>
          </button>
          <div class="expander-content" id="content-gpt"></div>
        </div>

        <div class="expander">
          <button class="expander-btn" onclick="toggleExpander('claude')">
            <span class="dot claude-dot"></span>
            <span>Claude Response</span>
            <span class="chevron" id="chevron-claude">▾</span>
          </button>
          <div class="expander-content" id="content-claude"></div>
        </div>

        <div class="expander">
          <button class="expander-btn" onclick="toggleExpander('gemini')">
            <span class="dot gemini-dot"></span>
            <span>Gemini Response</span>
            <span class="chevron" id="chevron-gemini">▾</span>
          </button>
          <div class="expander-content" id="content-gemini"></div>
        </div>
      </div>
    </div>
    <!-- no input bar on results screen -->
  </div>

  <!-- Shared hidden file input -->
  <input type="file" id="file-input" accept=".txt,.md,.pdf"
         style="display:none" onchange="uploadFile()" />

  <!-- Document pill (shown when a doc is active) -->
  <div id="doc-pill" class="doc-pill hidden">
    <span class="doc-pill-icon">📄</span>
    <span id="doc-pill-label"></span>
    <button class="doc-pill-clear" onclick="clearDocument()" title="Remove document">×</button>
  </div>

  <script src="/static/app.js?v=4"></script>
</body>
</html>
